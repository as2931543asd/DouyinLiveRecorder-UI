services:
  recorder:
    build: .
    image: douyin-live-recorder:local
    container_name: douyin-recorder
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: 8000
      TZ: Asia/Shanghai
    volumes:
      - ./config:/app/config
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./backup_config:/app/backup_config
